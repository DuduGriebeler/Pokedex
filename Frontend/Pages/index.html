<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../Css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
    <script src="../Js/script.js" defer></script>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <div class="logo">
                    <a href=""><img class="logo-img" src="../Imagem/logo_pokemon.png" width="200"></a>
                </div>
                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menuNavegacao">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menuNavegacao">
                    <ul class="navbar-nav ms-auto align-items-center gap-2">

                        <li class="nav-item">
                            <select id="typeFilter" class="form-select bg-dark text-white border-secondary">
                                <option value="">Todos os Tipos</option>
                                <option value="grass">Grama</option>
                                <option value="fire">Fogo</option>
                                <option value="water">Água</option>
                                <option value="electric">Elétrico</option>
                                <option value="bug">Inseto</option>
                                <option value="normal">Normal</option>
                                <option value="poison">Veneno</option>
                            </select>
                        </li>


                        <li class="nav-item">
                            <select id="sortOrder" class="form-select bg-dark text-white border-secondary">
                                <option value="id-Crescente">Crescente</option>
                                <option value="id-Decrescente">Decrescente</option>
                                <option value="name-Crescente">Ordem Alfabética (A-Z)</option>
                                <option value="name-Decrescente">Ordem Alfabética (Z-A)</option>
                            </select>
                        </li>

                        <form class="d-flex" role="search" onsubmit="event.preventDefault();">
                            <input id="searchInput" class="form-control me-2" type="search"
                                placeholder="Buscar Pokémon..." aria-label="Search" />
                        </form>

                        <form class="d-flex" role="search">
                            <button class="btn btn-outline-secondary" type="submit">GoPokemon</button>
                        </form>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container mt-4">
            <div id="pokemonList" class="row justify-content-center"></div>
        </div>

        <div id="spinner" class="d-none" class="text-center" >
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

    </main>

    <footer>
    </footer>

    <div class="modal fade" tabindex="-1" id="modal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalName">Nome do Pokémon</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body text-center fs-5">
                    <div class="modal-body text-center fs-5">
                        <div class="mb-3">
                            <img id="modalImagem" src="" alt="Imagem do Pokémon" class="img-fluid"
                                style="max-height: 200px;">
                        </div>
                        <p id="modalHeight">Altura</p>
                        <p id="modalWeight">Peso</p>
                        <p id="modalTypes">Tipos</p>
                        <p id="modalAbility">Habilidade</p>
                        <p id="modalHp">HP</p>
                        <p id="modalAttack">Ataque</p>
                        <p id="modalDefense">Defesa</p>
                        <p id="modalSpecialAttack">Ataque Especial</p>
                        <p id="modalSpecialDefense">Defesa Especial</p>
                        <p id="modalSpeed">Velocidade</p>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>

                </div>
            </div>
        </div>

</body>

</html>
